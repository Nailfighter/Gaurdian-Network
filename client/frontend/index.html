<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Guardian Backend Test</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .wrap {
            max-width: 760px;
            margin: 48px auto;
            padding: 24px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        button {
            padding: 10px 16px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            background: #0f766e;
            color: #fff;
            font-weight: 600;
        }

        pre {
            margin-top: 16px;
            background: #0b1220;
            color: #e5e7eb;
            padding: 14px;
            border-radius: 8px;
            overflow: auto;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <h1>Guardian Backend Test Page</h1>
        <p>This page only calls <strong>/api/test</strong> to verify backend connectivity.</p>
        <button id="run-test" type="button">Run Test</button>
        <pre id="result">Click "Run Test" to check the backend.</pre>
    </main>

    <script>
        const result = document.getElementById("result");
        const button = document.getElementById("run-test");

        async function runTest() {
            result.textContent = "Checking /api/test ...";
            try {
                const response = await fetch("/api/test");
                const body = await response.json();
                result.textContent = JSON.stringify({ status: response.status, body }, null, 2);
            } catch (error) {
                result.textContent = "Request failed: " + error.message;
            }
        }

        button.addEventListener("click", runTest);
        runTest();
    </script>
</body>
</html>
