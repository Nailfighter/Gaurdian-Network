<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: sans-serif;
      width: 280px;
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    .status-connected {
      background-color: #16a34a;
      box-shadow: 0 0 5px #16a34a;
    }

    .status-disconnected {
      background-color: #dc2626;
      box-shadow: 0 0 5px #dc2626;
    }

    .status-checking {
      background-color: #f59e0b;
      box-shadow: 0 0 5px #f59e0b;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    label {
      font-size: 12px;
      color: #555;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      margin: 4px 0 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 7px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #16a34a;
      text-align: center;
    }

    #connectionStatus {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
      color: #666;
    }

    .small-btn {
      margin-top: 8px;
      background: #111827;
      font-size: 12px;
      padding: 6px;
    }

    .small-btn:hover {
      background: #1f2937;
    }

    #blockStatus {
      margin-top: 8px;
      font-size: 11px;
      color: #374151;
      line-height: 1.4;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <h2>
    <span id="statusIndicator" class="status-indicator status-checking"></span>
    Guardian Monitor
  </h2>
  <div id="connectionStatus">Checking connection...</div>
  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="http://192.168.1.x:8001" />
  <button id="save">Save</button>
  <button id="refreshBlocklist" class="small-btn">Sync blocklist now</button>
  <div id="blockStatus">Block rules: checking...</div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>

</html>
