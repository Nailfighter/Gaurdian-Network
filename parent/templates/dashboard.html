<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardian — Parent Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <h1>Guardian Parent Dashboard</h1>
    <span id="status-indicator" class="status-dot online" title="Server status"></span>
  </header>

  <main>
    <div id="offline-banner" class="banner error" hidden>
      Server offline — retrying&hellip;
    </div>

    <section id="url-log-section">
      <h2>Browsing Activity</h2>
      <div id="url-log-list">
        <p class="empty-state">Loading&hellip;</p>
      </div>
    </section>
  </main>

  <script>
    const SERVER_URL = {{ server_url | tojson }};

    function fmt_time(ts) {
      if (!ts) return "—";
      try { return new Date(ts).toLocaleTimeString(); } catch { return ts; }
    }

    async function loadUrlLog() {
      const list   = document.getElementById("url-log-list");
      const banner = document.getElementById("offline-banner");
      const dot    = document.getElementById("status-indicator");

      try {
        const res = await fetch(`${SERVER_URL}/url-log?n=50`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const entries = data.entries ?? [];

        banner.hidden = true;
        dot.className = "status-dot online";

        if (entries.length === 0) {
          list.innerHTML = '<p class="empty-state">No activity yet — install the Chrome extension on the child\'s browser.</p>';
          return;
        }

        list.innerHTML = entries.map(e => `
          <div class="request-card">
            <div class="request-header">
              <span class="device">${e.domain ?? new URL(e.url).hostname}</span>
              <span class="timestamp">${fmt_time(e.timestamp)}</span>
            </div>
            <div class="url"><a href="${e.url}" target="_blank" rel="noopener noreferrer">${e.url}</a></div>
          </div>
        `).join("");
      } catch (err) {
        banner.hidden = false;
        dot.className = "status-dot offline";
        console.error("Failed to load URL log:", err);
      }
    }

    // Initial load + poll every 5 seconds
    loadUrlLog();
    setInterval(loadUrlLog, 5000);
  </script>
</body>
</html>
