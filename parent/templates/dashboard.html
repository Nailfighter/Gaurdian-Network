<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardian — Parent Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <h1>Guardian Parent Dashboard</h1>
    <span id="status-indicator" class="status-dot online" title="Server status"></span>
  </header>

  <main>
    <div id="offline-banner" class="banner error" hidden>
      Server offline — retrying&hellip;
    </div>

    <section id="requests-section">
      <h2>Child Requests</h2>
      <div id="requests-list">
        <p class="empty-state">Loading&hellip;</p>
      </div>
    </section>
  </main>

  <script>
    const SERVER_URL = {{ server_url | tojson }};

    function verdict_class(verdict) {
      if (verdict === "ALLOW")  return "badge allow";
      if (verdict === "BLOCK")  return "badge block";
      if (verdict === "PAUSED") return "badge paused";
      return "badge";
    }

    function fmt_time(ts) {
      if (!ts) return "—";
      try { return new Date(ts).toLocaleTimeString(); } catch { return ts; }
    }

    async function loadRequests() {
      const list   = document.getElementById("requests-list");
      const banner = document.getElementById("offline-banner");
      const dot    = document.getElementById("status-indicator");

      try {
        const res = await fetch(`${SERVER_URL}/requests`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        banner.hidden = true;
        dot.className = "status-dot online";

        const requests = data.requests ?? data ?? [];

        if (requests.length === 0) {
          list.innerHTML = '<p class="empty-state">No requests yet.</p>';
          return;
        }

        list.innerHTML = requests.map(r => `
          <div class="request-card" data-id="${r.id}" data-verdict="${r.verdict}">
            <div class="request-header">
              <span class="${verdict_class(r.verdict)}">${r.verdict ?? "PENDING"}</span>
              <span class="score">Score: ${r.decision_score ?? "—"}/100</span>
              <span class="device">${r.device_id ?? "unknown device"}</span>
              <span class="timestamp">${fmt_time(r.timestamp)}</span>
            </div>
            <div class="url"><a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.url}</a></div>
            ${r.reason_text ? `<div class="reason">${r.reason_text}</div>` : ""}
            ${r.verdict === "PAUSED" ? `
              <div class="actions">
                <button class="btn approve" onclick="decide('${r.id}', 'approve', this)">Approve</button>
                <button class="btn deny"    onclick="decide('${r.id}', 'deny',    this)">Deny</button>
              </div>` : ""}
          </div>
        `).join("");
      } catch (err) {
        banner.hidden = false;
        dot.className = "status-dot offline";
        console.error("Failed to load requests:", err);
      }
    }

    async function decide(id, action, btn) {
      const card = document.querySelector(`.request-card[data-id="${id}"]`);
      const buttons = card.querySelectorAll(".btn");
      buttons.forEach(b => { b.disabled = true; });

      try {
        const res = await fetch(`${SERVER_URL}/decision/${id}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const verdict = action === "approve" ? "ALLOW" : "BLOCK";
        const badge = card.querySelector(".badge");
        badge.textContent = verdict;
        badge.className = verdict_class(verdict);
        card.querySelector(".actions").remove();
      } catch (err) {
        buttons.forEach(b => { b.disabled = false; });
        alert("Failed to submit decision — please try again.");
        console.error(err);
      }
    }

    // Initial load + poll every 5 seconds
    loadRequests();
    setInterval(loadRequests, 5000);
  </script>
</body>
</html>
